<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Death Must Die — Combate v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#050308; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100vw; height:100vh; font-family:'Cinzel',serif; color:#c8a8e8; overflow:hidden; }
  #game-wrapper { position:relative; width:800px; height:560px; transform-origin:center center; }
  #canvas { display:block; border:1px solid rgba(120,60,180,0.4); }
  #hud { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

  /* HP bar */
  #hp-bar-container { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:8px; }
  #hp-label { font-size:9px; letter-spacing:3px; color:rgba(200,100,100,0.8); text-transform:uppercase; }
  #hp-bar-bg { width:150px; height:6px; background:rgba(80,20,20,0.6); border:1px solid rgba(180,60,60,0.35); border-radius:2px; overflow:hidden; }
  #hp-bar-fill { height:100%; background:linear-gradient(90deg,#8b1a1a,#d44); width:100%; transition:width 0.2s; }
  #hp-text { font-size:9px; color:rgba(220,120,120,0.8); min-width:50px; }

  /* XP bar */
  #xp-bar-container { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:8px; }
  #xp-label { font-size:8px; letter-spacing:3px; color:rgba(140,100,220,0.7); text-transform:uppercase; }
  #xp-bar-bg { width:150px; height:4px; background:rgba(40,10,70,0.6); border:0.5px solid rgba(120,60,200,0.25); border-radius:2px; overflow:hidden; }
  #xp-bar-fill { height:100%; background:linear-gradient(90deg,#5522aa,#aa66ff); width:0%; transition:width 0.15s; }
  #xp-text { font-size:8px; color:rgba(160,110,240,0.7); min-width:40px; }

  /* Skills HUD */
  #skills-hud { position:absolute; bottom:8px; right:12px; display:flex; flex-direction:column; gap:4px; align-items:flex-end; }
  .skill-hud-item { display:flex; align-items:center; gap:6px; font-size:8px; color:rgba(160,120,200,0.65); letter-spacing:1px; }
  .skill-hud-cd { width:30px; height:3px; background:rgba(60,20,80,0.5); border:0.5px solid rgba(120,60,180,0.3); border-radius:1px; overflow:hidden; }
  .skill-hud-cd-fill { height:100%; background:rgba(180,100,255,0.7); border-radius:1px; transition:width 0.1s linear; }

  /* Score */
  #score-area { position:absolute; top:10px; left:50%; transform:translateX(-50%); text-align:center; }
  #wave-label { font-size:8px; letter-spacing:4px; color:rgba(150,100,200,0.45); text-transform:uppercase; }
  #wave-num { font-size:17px; font-weight:700; color:rgba(200,150,255,0.9); font-family:'Cinzel Decorative',serif; }
  #kill-count { font-size:8px; letter-spacing:2px; color:rgba(150,100,180,0.45); }
  #keys-hint { position:absolute; top:10px; left:10px; font-size:8px; letter-spacing:1px; color:rgba(120,80,160,0.4); line-height:1.9; }

  /* ── TIER CARD STYLES ── */
  #levelup-overlay {
    display:none; position:absolute; inset:0;
    background:radial-gradient(ellipse at center, rgba(14,5,30,0.97) 0%, rgba(3,1,7,0.99) 100%);
    flex-direction:column; align-items:center; justify-content:center;
    gap:0.75rem; z-index:10; pointer-events:all;
  }
  #levelup-overlay.active { display:flex; }
  .lu-title-sub { font-size:9px; letter-spacing:5px; color:rgba(180,120,220,0.55); text-transform:uppercase; }
  .lu-title { font-family:'Cinzel Decorative',serif; font-size:19px; font-weight:700; color:#e8c87a; letter-spacing:2px; }
  .lu-divider { display:flex; align-items:center; gap:8px; }
  .lu-line { width:70px; height:1px; background:linear-gradient(90deg,transparent,rgba(180,100,220,0.45)); }
  .lu-line.r { background:linear-gradient(90deg,rgba(180,100,220,0.45),transparent); }
  .lu-gem { width:5px; height:5px; background:rgba(180,100,220,0.65); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); }

  .lu-cards { display:flex; gap:12px; }

  .lu-card {
    width:176px; border-radius:6px; padding:0;
    cursor:default; transition:transform 0.14s, box-shadow 0.14s;
    overflow:hidden; position:relative; border:1px solid transparent;
    opacity:0.85;
  }
  .lu-card.ready { cursor:pointer; opacity:1; }
  .lu-card.ready:hover { transform:translateY(-5px) scale(1.025); }

  /* D — gray steel */
  .tier-d { background:linear-gradient(165deg,#14181f,#0b0e14); border-color:rgba(85,105,135,0.5); }
  .tier-d.ready:hover { box-shadow:0 0 16px rgba(90,115,155,0.3); border-color:rgba(120,150,190,0.65); }
  .tier-d .lu-card-top { background:linear-gradient(90deg,transparent,rgba(100,130,170,0.65),transparent); }
  .tier-d .tier-badge { color:#7a9fbc; border-color:rgba(80,110,150,0.35); background:rgba(18,26,42,0.55); }
  .tier-d .lu-bonus-value { color:#9abdd6; }
  .tier-d .lu-card-name { color:#7a9fbc; }

  /* C — emerald */
  .tier-c { background:linear-gradient(165deg,#0d1c12,#080d0a); border-color:rgba(50,130,75,0.5); }
  .tier-c.ready:hover { box-shadow:0 0 16px rgba(55,150,80,0.3); border-color:rgba(70,190,95,0.65); }
  .tier-c .lu-card-top { background:linear-gradient(90deg,transparent,rgba(55,170,85,0.65),transparent); }
  .tier-c .tier-badge { color:#62c07e; border-color:rgba(45,120,65,0.35); background:rgba(10,28,15,0.55); }
  .tier-c .lu-bonus-value { color:#72d090; }
  .tier-c .lu-card-name { color:#62c07e; }

  /* B — sapphire */
  .tier-b { background:linear-gradient(165deg,#0c1424,#070c18); border-color:rgba(45,95,195,0.5); }
  .tier-b.ready:hover { box-shadow:0 0 18px rgba(50,115,215,0.3); border-color:rgba(75,145,250,0.65); }
  .tier-b .lu-card-top { background:linear-gradient(90deg,transparent,rgba(55,135,250,0.65),transparent); }
  .tier-b .tier-badge { color:#5d8fe8; border-color:rgba(45,95,195,0.35); background:rgba(10,18,45,0.55); }
  .tier-b .lu-bonus-value { color:#80b2ff; }
  .tier-b .lu-card-name { color:#5d8fe8; }

  /* A — amethyst */
  .tier-a { background:linear-gradient(165deg,#180d2c,#0c0718); border-color:rgba(125,55,205,0.6); }
  .tier-a.ready:hover { box-shadow:0 0 20px rgba(145,60,215,0.4); border-color:rgba(195,95,255,0.75); }
  .tier-a .lu-card-top { background:linear-gradient(90deg,transparent,rgba(175,75,255,0.75),transparent); }
  .tier-a .tier-badge { color:#c080f8; border-color:rgba(135,55,215,0.4); background:rgba(22,8,46,0.6); }
  .tier-a .lu-bonus-value { color:#d595ff; }
  .tier-a .lu-card-name { color:#c080f8; }

  /* S — gold legendary */
  .tier-s { background:linear-gradient(165deg,#261602,#160e06); border-color:rgba(215,155,25,0.7); }
  .tier-s.ready:hover { box-shadow:0 0 26px rgba(235,185,35,0.55); border-color:rgba(255,205,55,0.9); }
  .tier-s .lu-card-top { background:linear-gradient(90deg,transparent,rgba(235,185,35,0.9),transparent); height:4px; }
  .tier-s .tier-badge { color:#eeba35; border-color:rgba(195,145,18,0.45); background:rgba(36,18,4,0.65); }
  .tier-s .lu-bonus-value { color:#ffe050; text-shadow:0 0 10px rgba(255,215,50,0.4); }
  .tier-s .lu-card-name { color:#eeba35; }

  .lu-card-top { height:3px; }
  .tier-badge {
    font-size:7px; letter-spacing:3px; text-transform:uppercase;
    border:1px solid; border-radius:2px; padding:2px 8px;
    display:block; text-align:center; width:fit-content; margin:7px auto 0;
  }
  .lu-card-icon { text-align:center; font-size:26px; padding:5px 0; }
  .lu-card-body { padding:7px 12px 11px; }
  .lu-card-name { font-size:11px; font-weight:600; text-align:center; letter-spacing:1px; margin-bottom:4px; }
  .lu-card-desc { font-size:8px; color:rgba(160,130,190,0.55); text-align:center; line-height:1.5; font-style:italic; border-top:1px solid rgba(100,50,150,0.12); padding-top:5px; margin-bottom:6px; }
  .lu-bonus-box { background:rgba(0,0,0,0.22); border:1px solid rgba(255,255,255,0.06); border-radius:4px; padding:6px; text-align:center; }
  .lu-bonus-label { font-size:7px; letter-spacing:3px; color:rgba(200,150,255,0.35); text-transform:uppercase; margin-bottom:2px; }
  .lu-bonus-value { font-size:13px; font-weight:700; letter-spacing:1px; }
  .lu-bonus-desc { font-size:8px; color:rgba(200,170,230,0.65); margin-top:3px; line-height:1.3; }

  #lu-countdown { font-size:10px; letter-spacing:2px; color:rgba(180,140,220,0.5); text-transform:uppercase; }
  .lu-hint { font-size:8px; letter-spacing:3px; color:rgba(150,100,200,0.4); text-transform:uppercase; animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* Game Over */
  #gameover-overlay { display:none; position:absolute; inset:0; background:rgba(3,1,7,0.96); flex-direction:column; align-items:center; justify-content:center; gap:1rem; z-index:20; pointer-events:all; }
  #gameover-overlay.active { display:flex; }
  .go-title { font-family:'Cinzel Decorative',serif; font-size:26px; color:#c84444; letter-spacing:3px; }
  .go-sub { font-size:10px; letter-spacing:3px; color:rgba(180,80,80,0.55); }
  .go-btn { margin-top:0.8rem; font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px; color:#e8c87a; background:rgba(80,30,30,0.4); border:1px solid rgba(180,80,60,0.45); padding:9px 22px; border-radius:4px; cursor:pointer; text-transform:uppercase; transition:background 0.2s; }
  .go-btn:hover { background:rgba(140,50,50,0.4); }

  /* Damage numbers */
  #damage-numbers { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .dmg-num { position:absolute; font-size:11px; font-weight:700; color:#ff6644; font-family:'Cinzel',serif; animation:float-up 0.9s ease-out forwards; pointer-events:none; }
  .dmg-num.bleed { color:#dd2244; font-size:9px; }
  .dmg-num.shockwave { color:#ff9933; font-size:12px; }
  .dmg-num.boomerang { color:#44ddff; font-size:11px; }
  @keyframes float-up { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-40px)} }

  #heart-notif { position:absolute; top:48px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:3px; color:#ff6688; text-transform:uppercase; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
  #heart-notif.show { opacity:1; }

  /* ── START OVERLAY ── */
  #start-overlay {
    display:flex; position:absolute; inset:0;
    background:radial-gradient(ellipse at center, rgba(14,5,30,0.98) 0%, rgba(3,1,7,1) 100%);
    flex-direction:column; align-items:center; justify-content:center;
    gap:1rem; z-index:30; pointer-events:all;
  }
  #start-overlay.hidden { display:none; }
  .so-title-sub { font-size:9px; letter-spacing:5px; color:rgba(180,120,220,0.5); text-transform:uppercase; }
  .so-title { font-family:'Cinzel Decorative',serif; font-size:24px; font-weight:700; color:#e8c87a; letter-spacing:3px; }
  .so-divider { display:flex; align-items:center; gap:8px; margin:0.2rem 0; }
  .so-line { width:90px; height:1px; background:linear-gradient(90deg,transparent,rgba(180,100,220,0.45)); }
  .so-line.r { background:linear-gradient(90deg,rgba(180,100,220,0.45),transparent); }
  .so-gem { width:5px; height:5px; background:rgba(180,100,220,0.65); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); }

  .so-name-label { font-size:9px; letter-spacing:3px; color:rgba(180,130,220,0.6); text-transform:uppercase; }
  #nome-input {
    font-family:'Cinzel',serif; font-size:14px; letter-spacing:2px;
    color:#e8d8ff; background:rgba(30,10,60,0.7);
    border:1px solid rgba(140,80,220,0.45); border-radius:4px;
    padding:9px 18px; text-align:center; outline:none; width:220px;
    transition:border-color 0.2s;
  }
  #nome-input:focus { border-color:rgba(200,120,255,0.8); }
  #nome-input::placeholder { color:rgba(140,100,180,0.4); }
  #btn-jogar {
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px;
    color:#e8c87a; background:rgba(60,20,100,0.5);
    border:1px solid rgba(180,120,50,0.5); border-radius:4px;
    padding:10px 28px; cursor:pointer; text-transform:uppercase;
    transition:background 0.2s, border-color 0.2s; margin-top:0.3rem;
  }
  #btn-jogar:hover { background:rgba(90,35,140,0.5); border-color:rgba(230,180,60,0.7); }

  /* ── RANKING TABLE ── */
  .ranking-wrap { display:flex; flex-direction:column; align-items:center; gap:0.4rem; margin-top:0.4rem; }
  .ranking-title { font-size:8px; letter-spacing:4px; color:rgba(200,150,255,0.45); text-transform:uppercase; }
  .ranking-table { width:280px; border-collapse:collapse; }
  .ranking-table th { font-size:7px; letter-spacing:3px; color:rgba(160,110,220,0.4); text-transform:uppercase; padding:3px 6px; border-bottom:1px solid rgba(100,50,160,0.2); }
  .ranking-table td { font-size:9px; color:rgba(200,170,230,0.7); padding:4px 6px; text-align:center; border-bottom:1px solid rgba(80,40,120,0.15); }
  .ranking-table td.rank-pos { color:rgba(220,180,80,0.7); font-weight:700; font-size:10px; }
  .ranking-table td.rank-name { text-align:left; color:#c8a8e8; }
  .ranking-table tr.rank-gold td { color:#eeba35; }
  .ranking-table tr.rank-silver td { color:#b0c4d8; }
  .ranking-table tr.rank-bronze td { color:#cd8c52; }
  .ranking-empty { font-size:8px; letter-spacing:2px; color:rgba(140,100,180,0.35); font-style:italic; }

  /* ranking no game over */
  .go-ranking { margin-top:0.6rem; }
</style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="canvas" width="800" height="560"></canvas>

  <div id="start-overlay">
    <div class="so-title-sub">Prepare-se, Guerreiro</div>
    <div class="so-title">Hero of Screen</div>
    <div class="so-divider"><div class="so-line"></div><div class="so-gem"></div><div class="so-line r"></div></div>
    <div class="so-name-label">Seu nome</div>
    <input id="nome-input" type="text" maxlength="20" placeholder="Digite seu nome..." autocomplete="off" />
    <button id="btn-jogar" onclick="confirmarNome()">⚔ Entrar na Arena</button>
    <div class="ranking-wrap">
      <div class="so-divider" style="margin-top:0.5rem"><div class="so-line"></div><div class="so-gem"></div><div class="so-line r"></div></div>
      <div class="ranking-title">Melhores Guerreiros</div>
      <div id="ranking-start"></div>
    </div>
  </div>

  <div id="hud">
    <div id="score-area">
      <div id="wave-label">Onda</div>
      <div id="wave-num">1</div>
      <div id="kill-count">0 inimigos</div>
    </div>
    <div id="keys-hint">WASD — mover<br>Skills — automáticas</div>

    <div id="xp-bar-container">
      <div id="xp-label">XP</div>
      <div id="xp-bar-bg"><div id="xp-bar-fill"></div></div>
      <div id="xp-text">0/8</div>
    </div>
    <div id="hp-bar-container">
      <div id="hp-label">Vida</div>
      <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
      <div id="hp-text">100/100</div>
    </div>

    <div id="skills-hud">
      <div class="skill-hud-item" id="hud-golpe">Golpe <div class="skill-hud-cd"><div class="skill-hud-cd-fill" id="cd-golpe" style="width:100%"></div></div></div>
      <div class="skill-hud-item" id="hud-grito">Grito <div class="skill-hud-cd"><div class="skill-hud-cd-fill" id="cd-grito" style="width:100%"></div></div></div>
      <div class="skill-hud-item" id="hud-bume">Bumerangue <div class="skill-hud-cd"><div class="skill-hud-cd-fill" id="cd-bume" style="width:100%"></div></div></div>
    </div>
    <div id="heart-notif">❤️ +20 Vida!</div>
  </div>

  <div id="damage-numbers"></div>

  <div id="levelup-overlay">
    <div class="lu-title-sub">Guerreiro</div>
    <div class="lu-title">Novo Nível!</div>
    <div class="lu-divider"><div class="lu-line"></div><div class="lu-gem"></div><div class="lu-line r"></div></div>
    <div class="lu-cards" id="lu-cards"></div>
    <div id="lu-countdown">Aguarde 3s...</div>
    <div class="lu-hint" id="lu-hint" style="display:none">Escolha uma bênção</div>
  </div>

  <div id="gameover-overlay">
    <div class="go-title">VOCÊ MORREU</div>
    <div class="go-sub" id="go-stats"></div>
    <div class="go-ranking ranking-wrap">
      <div class="ranking-title">Melhores Guerreiros</div>
      <div id="ranking-go"></div>
    </div>
    <button class="go-btn" onclick="reiniciarJogo()">↺ Tentar Novamente</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// RANKING SYSTEM
// ═══════════════════════════════════════════════
const RANKING_KEY = 'hos_ranking_v1';
const RANKING_MAX = 5;

function calcScore(kills, wave, nivel) {
  return kills * 10 + wave * 50 + nivel * 20;
}

function carregarRanking() {
  try { return JSON.parse(localStorage.getItem(RANKING_KEY)) || []; }
  catch { return []; }
}

function salvarRanking(nome, kills, wave, nivel) {
  const lista = carregarRanking();
  lista.push({ nome, kills, wave, nivel, score: calcScore(kills, wave, nivel), data: new Date().toLocaleDateString('pt-BR') });
  lista.sort((a, b) => b.score - a.score);
  const top = lista.slice(0, RANKING_MAX);
  localStorage.setItem(RANKING_KEY, JSON.stringify(top));
  return top;
}

function renderRanking(containerId, destacarNome) {
  const lista = carregarRanking();
  const el = document.getElementById(containerId);
  if (!lista.length) {
    el.innerHTML = '<div class="ranking-empty">Nenhum guerreiro ainda — seja o primeiro!</div>';
    return;
  }
  const rowClasses = ['rank-gold', 'rank-silver', 'rank-bronze', '', ''];
  const medals = ['🥇', '🥈', '🥉', '4º', '5º'];
  let rows = lista.map((p, i) => {
    const hl = destacarNome && p.nome === destacarNome && p.score === calcScore(jogador?.kills||0, wave, jogador?.nivel||1) ? ' style="background:rgba(200,160,50,0.08)"' : '';
    return `<tr class="${rowClasses[i]||''}"${hl}>
      <td class="rank-pos">${medals[i]}</td>
      <td class="rank-name">${escHtml(p.nome)}</td>
      <td>${p.score.toLocaleString()}</td>
      <td>${p.kills}</td>
      <td>${p.wave}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table class="ranking-table">
    <thead><tr><th>#</th><th style="text-align:left">Nome</th><th>Pontos</th><th>Kills</th><th>Onda</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Nome do jogador atual
let nomeJogador = '';

function confirmarNome() {
  const inp = document.getElementById('nome-input');
  const nome = inp.value.trim();
  if (!nome) { inp.focus(); inp.style.borderColor='rgba(255,80,80,0.7)'; setTimeout(()=>inp.style.borderColor='',1000); return; }
  nomeJogador = nome;
  document.getElementById('start-overlay').classList.add('hidden');
  inicializar();
}

// ═══════════════════════════════════════════════
// TIER SYSTEM
// ═══════════════════════════════════════════════
const TIERS = [
  { nome:'D', chance:0.30, mult:0.10, classe:'tier-d' },
  { nome:'C', chance:0.25, mult:0.20, classe:'tier-c' },
  { nome:'B', chance:0.20, mult:0.30, classe:'tier-b' },
  { nome:'A', chance:0.10, mult:0.40, classe:'tier-a' },
  { nome:'S', chance:0.15, mult:0.50, classe:'tier-s' },
];

function sortearTier() {
  let r = Math.random(), acc = 0;
  for (const t of TIERS) { acc += t.chance; if (r < acc) return t; }
  return TIERS[TIERS.length-1];
}

// ═══════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════
const CW = 800, CH = 560, TILE = 40;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// ═══════════════════════════════════════════════
// JOGADOR
// ═══════════════════════════════════════════════
class Jogador {
  constructor() {
    this.x = CW/2; this.y = CH/2;

    this.skills = {
      golpeArrojado: {
        nome:'Golpe Arrojado', tipo:'Ataque Ativo', icone:'⚔️',
        desc:'Ataca o inimigo mais próximo', dano:18,
        cdMax:0.8, cd:0, ativo:true,
        bonusTpls:[
          { gerar:(t)=>({ label:`+${pct(t)}% Dano [${t.nome}]`, val:`+${pct(t)}%`, desc:`Dano aumentado em ${pct(t)}%`, tier:t, apply:(sk)=>{ sk.dano=Math.round(sk.dano*(1+t.mult)); } }) },
          { gerar:(t)=>({ label:`+${pct(t)}% Vel. Ataque [${t.nome}]`, val:`-${pct(t)}% CD`, desc:`Cooldown reduzido em ${pct(t)}%`, tier:t, apply:(sk)=>{ sk.cdMax=Math.max(0.2,sk.cdMax*(1-t.mult)); } }) }
        ]
      },
      gritoDeguerra: {
        nome:'Grito de Guerra', tipo:'Efeito de Área', icone:'💥',
        desc:'Onda de choque empurra todos próximos',
        dano:12, area:100, cdMax:3.0, cd:0, ativo:false,
        bonusTpls:[
          { gerar:(t)=>({ label:`+${pct(t)}% Dano [${t.nome}]`, val:`+${pct(t)}%`, desc:`Dano do grito +${pct(t)}%`, tier:t, apply:(sk)=>{ sk.dano=Math.round(sk.dano*(1+t.mult)); } }) },
          { gerar:(t)=>{ const p=Math.round(t.mult*120); return { label:`+${p}% Área [${t.nome}]`, val:`+${p}%`, desc:`Área aumentada em ${p}%`, tier:t, apply:(sk)=>{ sk.area=Math.round(sk.area*(1+p/100)); } }; } }
        ]
      },
      hemorragia: {
        nome:'Hemorragia', tipo:'Passiva', icone:'🩸',
        desc:'Ataques aplicam sangramento',
        chance:0.30, danoPorTick:3, duracao:5, ativo:false,
        bonusTpls:[
          { gerar:(t)=>({ label:`+${pct(t)}% Sangramento [${t.nome}]`, val:`+${pct(t)}%`, desc:`Dano de sangramento +${pct(t)}%`, tier:t, apply:(sk)=>{ sk.danoPorTick=Math.round(sk.danoPorTick*(1+t.mult)); } }) },
          { gerar:(t)=>{ const s=Math.round(t.mult*8); return { label:`+${s}s Duração [${t.nome}]`, val:`+${s}s`, desc:`Sangramento dura ${s}s a mais`, tier:t, apply:(sk)=>{ sk.duracao+=s; } }; } }
        ]
      },
      bumerangue: {
        nome:'Bumerangue', tipo:'Arremesso', icone:'🪃',
        desc:'Vai e volta causando dano',
        dano:14, tamanho:12, cdMax:2.2, cd:0, ativo:false,
        bonusTpls:[
          { gerar:(t)=>({ label:`+${pct(t)}% Dano [${t.nome}]`, val:`+${pct(t)}%`, desc:`Dano do bumerangue +${pct(t)}%`, tier:t, apply:(sk)=>{ sk.dano=Math.round(sk.dano*(1+t.mult)); } }) },
          { gerar:(t)=>({ label:`+${pct(t)}% Vel. Recarga [${t.nome}]`, val:`-${pct(t)}% CD`, desc:`Cooldown reduzido em ${pct(t)}%`, tier:t, apply:(sk)=>{ sk.cdMax=Math.max(0.5,sk.cdMax*(1-t.mult)); } }) },
          { gerar:(t)=>{ const p=pct(t); return { label:`+${p}% Tamanho [${t.nome}]`, val:`+${p}%`, desc:`Bumerangue ${p}% maior`, tier:t, apply:(sk)=>{ sk.tamanho=Math.round(sk.tamanho*(1+t.mult)); } }; } }
        ]
      }
    };
  }

  get rect() { return { x:this.x-this.w/2, y:this.y-this.h/2, w:this.w, h:this.h }; }

  receberDano(d) {
    if (this.invincible>0) return;
    this.hp = Math.max(0, this.hp-d);
    this.invincible = 0.6;
    spawnDmg(this.x, this.y-14, d, 'player');
  }

  curar(v) {
    this.hp = Math.min(this.maxHp, this.hp+v);
    const n = document.getElementById('heart-notif');
    n.classList.add('show');
    setTimeout(()=>n.classList.remove('show'), 1800);
  }

  ganharXP(v) {
    this.xp += v;
    if (this.xp >= this.xpNext) {
      this.xp -= this.xpNext;
      this.xpNext = Math.round(this.xpNext*1.4);
      this.nivel++;
      this.hp = Math.min(this.maxHp, this.hp+10);
      mostrarLevelUp();
    }
  }

  update(dt, keys) {
    let dx=0,dy=0;
    if (keys['w']||keys['arrowup'])    dy=-1;
    if (keys['s']||keys['arrowdown'])  dy=1;
    if (keys['a']||keys['arrowleft'])  dx=-1;
    if (keys['d']||keys['arrowright']) dx=1;
    if (dx&&dy){dx*=0.707;dy*=0.707;}
    this.x = Math.max(12,Math.min(CW-12, this.x+dx*this.speed*dt));
    this.y = Math.max(12,Math.min(CH-12, this.y+dy*this.speed*dt));
    if (this.invincible>0) this.invincible-=dt;

    const sk=this.skills;
    sk.golpeArrojado.cd = Math.max(0,sk.golpeArrojado.cd-dt);
    sk.gritoDeguerra.cd = Math.max(0,sk.gritoDeguerra.cd-dt);
    sk.bumerangue.cd    = Math.max(0,sk.bumerangue.cd-dt);

    if (sk.golpeArrojado.cd<=0){ sk.golpeArrojado.cd=sk.golpeArrojado.cdMax; dispGolpe(); }
    if (sk.gritoDeguerra.ativo && sk.gritoDeguerra.cd<=0){ sk.gritoDeguerra.cd=sk.gritoDeguerra.cdMax; dispGrito(); }
    if (sk.bumerangue.ativo && sk.bumerangue.cd<=0 && !bumeAtivo){ sk.bumerangue.cd=sk.bumerangue.cdMax; dispBume(); }
  }

  draw() {
    ctx.save();
    ctx.fillStyle='rgba(60,20,100,0.32)';
    ctx.beginPath(); ctx.ellipse(this.x, this.y+this.h/2+3, this.w/2, 4, 0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    const flash = this.invincible>0 && Math.floor(this.invincible*10)%2===0;
    if (!flash) {
      ctx.save();
      ctx.shadowColor='rgba(100,160,255,0.5)'; ctx.shadowBlur=12;
      ctx.fillStyle='#3a6ecc';
      ctx.fillRect(this.x-this.w/2, this.y-this.h/2, this.w, this.h);
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(160,200,255,0.28)';
      ctx.fillRect(this.x-this.w/2+2, this.y-this.h/2+2, this.w-4, 4);
      ctx.fillStyle='#1a3e88';
      ctx.fillRect(this.x-this.w/2, this.y+2, this.w, this.h/2-2);
      ctx.fillStyle='#88ccff';
      ctx.fillRect(this.x-4, this.y-3, 3,2);
      ctx.fillRect(this.x+1, this.y-3, 3,2);
      ctx.restore();
    }

    // XP mini bar above player
    const xpR = this.xp/this.xpNext;
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(this.x-18, this.y-this.h/2-9, 36, 4);
    ctx.fillStyle='#8844ff';
    ctx.fillRect(this.x-18, this.y-this.h/2-9, 36*xpR, 4);
  }
}

// INIMIGO
// ═══════════════════════════════════════════════
class Inimigo {
  constructor(x,y,wave) {
    this.x=x; this.y=y; this.w=14; this.h=14;
    this.speed=48+wave*4;
    const hp=22+wave*8; this.hp=hp; this.maxHp=hp;
    this.bleeds=[]; this.bleedTimer=0;
    this.kb={vx:0,vy:0}; this.deathTimer=0; this.dead=false;
    this.variant=Math.random()<0.2?'shield':'normal';
    if(this.variant==='shield'){this.hp*=1.5;this.maxHp=this.hp;this.speed*=0.8;}
  }
  get rect(){return{x:this.x-this.w/2,y:this.y-this.h/2,w:this.w,h:this.h};}

  receberDano(d,jog) {
    this.hp-=d;
    spawnDmg(this.x,this.y-12,d);
    const hemo=jog.skills.hemorragia;
    if(hemo.ativo && Math.random()<hemo.chance) this.bleeds.push({timer:hemo.duracao,dano:hemo.danoPorTick});
    if(this.hp<=0&&!this.dead){this.dead=true;jog.kills++;jog.ganharXP(1);}
  }

  knockback(dx,dy,f){
    const l=Math.sqrt(dx*dx+dy*dy)||1;
    this.kb.vx+=(dx/l)*f; this.kb.vy+=(dy/l)*f;
  }

  update(dt,jog) {
    if(this.dead){this.deathTimer+=dt;return;}
    this.kb.vx*=(1-dt*8); this.kb.vy*=(1-dt*8);
    this.x+=this.kb.vx*dt; this.y+=this.kb.vy*dt;
    const ddx=jog.x-this.x,ddy=jog.y-this.y,dist=Math.sqrt(ddx*ddx+ddy*ddy);
    if(dist>2){this.x+=(ddx/dist)*this.speed*dt;this.y+=(ddy/dist)*this.speed*dt;}
    this.bleedTimer+=dt;
    if(this.bleedTimer>=1){
      this.bleedTimer-=1;
      for(const b of this.bleeds){
        if(b.timer>0){this.hp-=b.dano;spawnDmg(this.x,this.y-14,b.dano,'bleed');b.timer--;
          if(this.hp<=0&&!this.dead){this.dead=true;jog.kills++;jog.ganharXP(1);}
        }
      }
      this.bleeds=this.bleeds.filter(b=>b.timer>0);
    }
    if(rects(jog.rect,this.rect)) jog.receberDano(8);
  }

  draw() {
    if(this.dead){
      if(this.deathTimer<0.3){
        const a=1-this.deathTimer/0.3;
        ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#cc2222';
        ctx.fillRect(this.x-this.w/2,this.y-this.h/2,this.w*a,this.h*a);ctx.restore();
      }
      return;
    }
    const hb=this.bleeds.length>0;
    ctx.save();
    ctx.shadowColor=hb?'rgba(200,30,50,0.55)':'rgba(200,60,60,0.2)';
    ctx.shadowBlur=hb?10:3;
    ctx.fillStyle=this.variant==='shield'?'#cc8822':'#bb2222';
    ctx.fillRect(this.x-this.w/2,this.y-this.h/2,this.w,this.h);
    ctx.fillStyle='rgba(255,180,180,0.12)';
    ctx.fillRect(this.x-this.w/2+1,this.y-this.h/2+1,this.w-2,3);
    ctx.fillStyle='#330000';
    ctx.fillRect(this.x-4,this.y-2,2,2);ctx.fillRect(this.x+2,this.y-2,2,2);
    if(this.variant==='shield'){ctx.fillStyle='rgba(255,200,80,0.4)';ctx.fillRect(this.x-2,this.y+2,4,3);}
    ctx.restore();
    const bw=18,hr=Math.max(0,this.hp/this.maxHp);
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(this.x-bw/2,this.y-this.h/2-6,bw,3);
    ctx.fillStyle=hr>0.5?'#44dd44':hr>0.25?'#ddaa22':'#dd2222';
    ctx.fillRect(this.x-bw/2,this.y-this.h/2-6,bw*hr,3);
  }
}

// BUMERANGUE PROJECTILE
// ═══════════════════════════════════════════════
let bumes=[],bumeAtivo=false;

class Bume {
  constructor(jog) {
    this.jog=jog;
    this.sk=jog.skills.bumerangue;
    this.x=jog.x; this.y=jog.y;
    this.size=this.sk.tamanho;
    this.dano=this.sk.dano;
    let alvo=null,minD=Infinity;
    for(const e of inimigos){ if(e.dead) continue; const d=Math.hypot(e.x-jog.x,e.y-jog.y); if(d<minD){minD=d;alvo=e;} }
    const ang=alvo?Math.atan2(alvo.y-jog.y,alvo.x-jog.x):Math.random()*Math.PI*2;
    this.vx=Math.cos(ang)*330; this.vy=Math.sin(ang)*330;
    this.angle=0; this.maxDist=190; this.dist=0;
    this.returning=false;
    this.hitIda=new Set(); this.hitVolta=new Set();
    this.dead=false;
    bumeAtivo=true;
  }

  update(dt) {
    this.angle+=dt*11;
    if(!this.returning){
      this.x+=this.vx*dt; this.y+=this.vy*dt;
      this.dist+=Math.hypot(this.vx,this.vy)*dt;
      if(this.dist>=this.maxDist) this.returning=true;
      this.colide(this.hitIda);
    } else {
      const dx=this.jog.x-this.x,dy=this.jog.y-this.y,d=Math.hypot(dx,dy);
      if(d<14){this.dead=true;bumeAtivo=false;return;}
      const sp=350;
      this.x+=(dx/d)*sp*dt; this.y+=(dy/d)*sp*dt;
      this.colide(this.hitVolta);
    }
  }

  colide(set) {
    for(const e of inimigos){
      if(e.dead||set.has(e)) continue;
      if(Math.hypot(e.x-this.x,e.y-this.y)<this.size+8){
        e.receberDano(this.dano,this.jog);
        spawnDmg(e.x,e.y-12,this.dano,'boomerang');
        e.knockback(e.x-this.x,e.y-this.y,110);
        set.add(e);
      }
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    const s=this.size;
    ctx.shadowColor=this.returning?'rgba(255,130,60,0.55)':'rgba(60,210,255,0.55)';
    ctx.shadowBlur=10;
    ctx.strokeStyle=this.returning?'#ff8844':'#44ddff';
    ctx.lineWidth=3.5; ctx.lineCap='round';
    ctx.beginPath();
    ctx.arc(0,0,s,-0.15,Math.PI*1.15);
    ctx.stroke();
    ctx.fillStyle=this.returning?'#ffaa66':'#88eeff';
    ctx.beginPath();ctx.arc(s*Math.cos(-0.15),s*Math.sin(-0.15),3.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(s*Math.cos(Math.PI*1.15),s*Math.sin(Math.PI*1.15),3.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

// CORAÇÃO (cura)
// ═══════════════════════════════════════════════
let coracoes=[],heartTimer=0;
const HEART_INTERVAL=20;

class Coracao {
  constructor(){
    this.x=60+Math.random()*(CW-120);
    this.y=60+Math.random()*(CH-120);
    this.r=10; this.pulse=0; this.gone=false;
  }
  update(dt,jog){
    this.pulse+=dt*3;
    if(Math.hypot(jog.x-this.x,jog.y-this.y)<this.r+10){jog.curar(20);this.gone=true;}
  }
  draw(){
    if(this.gone) return;
    const p=1+Math.sin(this.pulse)*0.12;
    ctx.save();
    ctx.translate(this.x,this.y); ctx.scale(p,p);
    ctx.shadowColor='rgba(255,80,120,0.65)'; ctx.shadowBlur=14;
    const s=this.r;
    ctx.fillStyle='#ff4477';
    ctx.beginPath();
    ctx.moveTo(0,s*0.4);
    ctx.bezierCurveTo(-s*1.1,-s*0.4,-s*1.1,-s*1.1,0,-s*0.5);
    ctx.bezierCurveTo(s*1.1,-s*1.1,s*1.1,-s*0.4,0,s*0.4);
    ctx.fill();
    ctx.fillStyle='rgba(255,200,220,0.38)';
    ctx.beginPath();ctx.ellipse(-s*0.25,-s*0.55,s*0.22,s*0.16,-0.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.fillStyle='rgba(255,180,200,0.65)';
    ctx.font='8px Cinzel,serif'; ctx.textAlign='center';
    ctx.fillText('+20',this.x,this.y+this.r+13);
  }
}

// EFEITOS VISUAIS
// ═══════════════════════════════════════════════
let efeitos=[];
function addEf(e){efeitos.push(e);}
function updEf(dt){efeitos=efeitos.filter(e=>{e.vida-=dt;return e.vida>0;});}
function drawEf(){
  for(const e of efeitos){
    const t=1-e.vida/e.vidaMax;
    ctx.save();ctx.globalAlpha=Math.max(0,1-t*1.3);
    if(e.tipo==='golpe'){
      ctx.strokeStyle='#88ccff';ctx.lineWidth=2.5;ctx.shadowColor='#aaddff';ctx.shadowBlur=8;
      ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.lineTo(e.x2+(e.x2-e.x1)*t*0.3,e.y2+(e.y2-e.y1)*t*0.3);ctx.stroke();
      const ang=Math.atan2(e.y2-e.y1,e.x2-e.x1);
      ctx.strokeStyle='rgba(255,220,120,0.65)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(e.x1,e.y1,13+t*17,ang-0.5,ang+0.5);ctx.stroke();
    }
    if(e.tipo==='grito'){
      const r=e.rMax*t;
      ctx.strokeStyle='#ff9933';ctx.lineWidth=3-t*2;ctx.shadowColor='#ffbb44';ctx.shadowBlur=18;
      ctx.beginPath();ctx.arc(e.cx,e.cy,r,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha*=0.28;
      ctx.beginPath();ctx.arc(e.cx,e.cy,r*0.52,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  }
}

// SKILL DISPATCH
// ═══════════════════════════════════════════════
function dispGolpe(){
  let alvo=null,minD=Infinity;
  for(const e of inimigos){if(e.dead)continue;const d=Math.hypot(e.x-jogador.x,e.y-jogador.y);if(d<minD){minD=d;alvo=e;}}
  if(!alvo)return;
  const sk=jogador.skills.golpeArrojado;
  alvo.receberDano(sk.dano,jogador);
  alvo.knockback(alvo.x-jogador.x,alvo.y-jogador.y,80);
  addEf({tipo:'golpe',vida:0.22,vidaMax:0.22,x1:jogador.x,y1:jogador.y,x2:alvo.x,y2:alvo.y});
}

function dispGrito(){
  const sk=jogador.skills.gritoDeguerra;
  for(const e of inimigos){
    if(e.dead)continue;
    const d=Math.hypot(e.x-jogador.x,e.y-jogador.y);
    if(d<=sk.area){e.receberDano(sk.dano,jogador);e.knockback(e.x-jogador.x,e.y-jogador.y,175);spawnDmg(e.x,e.y-10,sk.dano,'shockwave');}
  }
  addEf({tipo:'grito',vida:0.5,vidaMax:0.5,cx:jogador.x,cy:jogador.y,rMax:sk.area});
}

function dispBume(){
  bumes.push(new Bume(jogador));
}

  const lado=Math.floor(Math.random()*4);

// DAMAGE NUMBERS
// ═══════════════════════════════════════════════
function spawnDmg(x,y,v,t='normal'){
  const el=document.createElement('div');
  el.className='dmg-num'+(t==='bleed'?' bleed':t==='shockwave'?' shockwave':t==='boomerang'?' boomerang':'');
  el.textContent=Math.round(v);
  el.style.left=(x-10+(Math.random()-0.5)*20)+'px';
  el.style.top=(y+(Math.random()-0.5)*10)+'px';
  document.getElementById('damage-numbers').appendChild(el);
  setTimeout(()=>el.remove(),900);
}

function rects(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function pct(t){return Math.round(t.mult*100);}

// ═══════════════════════════════════════════════
// FUNDO
// ═══════════════════════════════════════════════
function drawBg(){
  ctx.fillStyle='#060410';ctx.fillRect(0,0,CW,CH);
  for(let gx=0;gx<CW;gx+=TILE){
    for(let gy=0;gy<CH;gy+=TILE){
      ctx.fillStyle=(Math.floor(gx/TILE)+Math.floor(gy/TILE))%2===0?'rgba(255,255,255,0.015)':'rgba(0,0,0,0)';
      ctx.fillRect(gx,gy,TILE,TILE);
    }
  }
  ctx.strokeStyle='rgba(80,40,120,0.09)';ctx.lineWidth=0.5;
  for(let gx=0;gx<=CW;gx+=TILE){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,CH);ctx.stroke();}
  for(let gy=0;gy<=CH;gy+=TILE){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(CW,gy);ctx.stroke();}
  ctx.save();ctx.strokeStyle='rgba(80,40,130,0.11)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(CW/2,CH/2,80,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(CW/2,CH/2,46,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════
// LEVEL UP — CARTAS COM TIER (pode repetir skill)
// ═══════════════════════════════════════════════
let jogoPausado=false, luReady=false, luCdTimer=0;

function gerarCartas(n){
  const allSks = Object.values(jogador.skills);
  const ativas  = allSks.filter(sk => sk.ativo);
  const inativas = allSks.filter(sk => !sk.ativo);

  // Monta candidatos: desbloquear inativas + buffs para ativas
  const candidatos = [];
  for(const sk of inativas){
    candidatos.push({ sk, isUnlock:true });
  }
  for(const sk of ativas){
    for(const tmpl of sk.bonusTpls){
      candidatos.push({ sk, tmpl, isUnlock:false });
    }
  }

  // Embaralha e pega n únicos
  candidatos.sort(()=>Math.random()-0.5);
  const selecionados = candidatos.slice(0, n);

  return selecionados.map(({ sk, tmpl, isUnlock }) => {
    const tier = sortearTier();
    if(isUnlock){
      return {
        sk, isUnlock:true,
        bonus:{
          val:'DESBLOQUEAR',
          desc:`Ativa ${sk.nome} permanentemente`,
          tier,
          apply:(s)=>{ s.ativo=true; }
        }
      };
    }
    const bonus = tmpl.gerar(tier);
    return { sk, isUnlock:false, bonus };
  });
}

function mostrarLevelUp(){
  jogoPausado=true; luReady=false; luCdTimer=3;
  const ov=document.getElementById('levelup-overlay');
  ov.classList.add('active');

  const pool=gerarCartas(3);
  const cont=document.getElementById('lu-cards');
  cont.innerHTML='';

  pool.forEach(({sk,bonus,isUnlock})=>{
    const card=document.createElement('div');
    card.className=`lu-card ${bonus.tier.classe}`;
    const badgeLabel = isUnlock ? `✦ Nova Skill` : `Rank ${bonus.tier.nome}`;
    const bonusLabel = isUnlock ? 'Desbloquear' : 'Bênção';
    card.innerHTML=`
      <div class="lu-card-top"></div>
      <div class="tier-badge">${badgeLabel}</div>
      <div class="lu-card-icon">${sk.icone}</div>
      <div class="lu-card-body">
        <div class="lu-card-name">${sk.nome}</div>
        <div class="lu-card-desc">${sk.desc}</div>
        <div class="lu-bonus-box">
          <div class="lu-bonus-label">${bonusLabel}</div>
          <div class="lu-bonus-value">${bonus.val}</div>
          <div class="lu-bonus-desc">${bonus.desc}</div>
        </div>
      </div>`;
    card.addEventListener('click',()=>{
      if(!luReady) return;
      bonus.apply(sk);
      ov.classList.remove('active');
      jogoPausado=false;
    });
    cont.appendChild(card);
  });

  document.getElementById('wave-num').textContent=jogador.nivel;
  document.getElementById('lu-countdown').style.display='block';
  document.getElementById('lu-hint').style.display='none';
  tickCd();
}

function tickCd(){
  const cd=document.getElementById('lu-countdown');
  const hint=document.getElementById('lu-hint');
  if(luCdTimer>0){
    cd.textContent=`Aguarde ${luCdTimer}s...`;
    luCdTimer--;
    setTimeout(tickCd,1000);
  } else {
    luReady=true;
    cd.style.display='none';
    hint.style.display='block';
    document.querySelectorAll('.lu-card').forEach(c=>c.classList.add('ready'));
  }
}

// HUD
// ═══════════════════════════════════════════════
function updHUD(){
  const hpR=jogador.hp/jogador.maxHp;
  document.getElementById('hp-bar-fill').style.width=(hpR*100)+'%';
  document.getElementById('hp-text').textContent=Math.ceil(jogador.hp)+'/'+jogador.maxHp;
  const xpR=jogador.xp/jogador.xpNext;
  document.getElementById('xp-bar-fill').style.width=(xpR*100)+'%';
  document.getElementById('xp-text').textContent=jogador.xp+'/'+jogador.xpNext;
  document.getElementById('kill-count').textContent=jogador.kills+' inimigos';
  const sk=jogador.skills;
  document.getElementById('cd-golpe').style.width=((1-sk.golpeArrojado.cd/sk.golpeArrojado.cdMax)*100)+'%';

  const hudGrito = document.getElementById('hud-grito');
  if(sk.gritoDeguerra.ativo){
    hudGrito.style.opacity='1';
    document.getElementById('cd-grito').style.width=((1-sk.gritoDeguerra.cd/sk.gritoDeguerra.cdMax)*100)+'%';
  } else { hudGrito.style.opacity='0.3'; document.getElementById('cd-grito').style.width='0%'; }

  const hudBume = document.getElementById('hud-bume');
  if(sk.bumerangue.ativo){
    hudBume.style.opacity='1';
    document.getElementById('cd-bume').style.width=((1-sk.bumerangue.cd/sk.bumerangue.cdMax)*100)+'%';
  } else { hudBume.style.opacity='0.3'; document.getElementById('cd-bume').style.width='0%'; }
}

function reiniciarJogo(){
  document.getElementById('gameover-overlay').classList.remove('active');
  document.getElementById('levelup-overlay').classList.remove('active');
  // volta pra tela de nome
  const so = document.getElementById('start-overlay');

// INPUT
// ═══════════════════════════════════════════════
const keys={};
window.addEventListener('keydown',e=>{if(document.activeElement.id==='nome-input')return;keys[e.key.toLowerCase()]=true;e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

// ═══════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════
let jogador,inimigos,gameOver,lastTime=0;

function inicializar(){
  jogador=new Jogador();
  inimigos=[];efeitos=[];bumes=[];coracoes=[];
  bumeAtivo=false;gameOver=false;jogoPausado=false;
  wave=1;waveTimer=0;spawnTimer=0;heartTimer=0;
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

function loop(ts){
  if(gameOver) return;
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;

  if(!jogoPausado){
    waveTimer+=dt;
    if(waveTimer>=20){waveTimer-=20;wave++;document.getElementById('wave-num').textContent=wave;}

    const sr=Math.max(0.28,1.7-wave*0.11);
    spawnTimer+=dt;
    if(spawnTimer>=sr){spawnTimer-=sr;spawnInimigo();if(wave>3&&Math.random()<0.3)spawnInimigo();}

    heartTimer+=dt;
    if(heartTimer>=HEART_INTERVAL){heartTimer-=HEART_INTERVAL;coracoes.push(new Coracao());}

    jogador.update(dt,keys);
    for(const e of inimigos) e.update(dt,jogador);
    inimigos=inimigos.filter(e=>!e.dead||e.deathTimer<0.3);
    for(const b of bumes) b.update(dt);
    bumes=bumes.filter(b=>!b.dead);
    for(const c of coracoes) c.update(dt,jogador);
    coracoes=coracoes.filter(c=>!c.gone);
    updEf(dt);

    if(jogador.hp<=0&&!gameOver){gameOver=true;mostrarGameOver();return;}
  }

  drawBg();
  for(const c of coracoes) c.draw();
  drawEf();
  for(const e of inimigos) e.draw();
  for(const b of bumes) b.draw();
  jogador.draw();
  updHUD();

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════
// API PÚBLICA
// ═══════════════════════════════════════════════
function aumentarSkillJogador(nome,attr,val){
  if(!jogador) return;
  const sk=jogador.skills[nome]; if(!sk) return;
  if(attr==='dano') sk.dano=Math.round(sk.dano*(1+val));
  if(attr==='area') sk.area=Math.round(sk.area*(1+val));
  if(attr==='cooldown') sk.cdMax=Math.max(0.2,sk.cdMax*(1-val));
  if(attr==='tamanho') sk.tamanho=Math.round(sk.tamanho*(1+val));
}

// ── FULLSCREEN SCALE ──
function ajustarScale() {
  const wrapper = document.getElementById('game-wrapper');
  const scaleX = window.innerWidth  / 800;
  const scaleY = window.innerHeight / 560;
  const scale  = Math.min(scaleX, scaleY);
  wrapper.style.transform = `scale(${scale})`;
}
ajustarScale();
window.addEventListener('resize', ajustarScale);
